<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nvex — Physical AI Orchestration</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Variables ───────────────────────────────────────────────────────── */
:root {
  --bg:          #07080f;
  --bg-mid:      #0c0d1a;
  --surf:        rgba(255,255,255,0.028);
  --surf-hi:     rgba(255,255,255,0.055);
  --surf-hover:  rgba(255,255,255,0.07);
  --border:      rgba(99,102,241,0.18);
  --border-hi:   rgba(139,92,246,0.45);
  --a1:          #6366f1;
  --a2:          #8b5cf6;
  --a3:          #a78bfa;
  --grad:        linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
  --grad-hi:     linear-gradient(135deg, #818cf8 0%, #a78bfa 100%);
  --t1:          #f1f5f9;
  --t2:          #94a3b8;
  --t3:          #4b5563;
  --t4:          #1e293b;
  --green:       #10b981;
  --green-dim:   rgba(16,185,129,0.15);
  --red:         #f43f5e;
  --red-dim:     rgba(244,63,94,0.15);
  --orange:      #f97316;
  --orange-dim:  rgba(249,115,22,0.12);
  --yellow:      #f59e0b;
  --yellow-dim:  rgba(245,158,11,0.12);
  --cyan:        #06b6d4;
  --cyan-dim:    rgba(6,182,212,0.12);
  --sidebar-w:   224px;
  --topbar-h:    56px;
  --radius:      10px;
  --radius-lg:   16px;
  --shadow:      0 4px 24px rgba(0,0,0,0.4);
  --shadow-glow: 0 0 32px rgba(99,102,241,0.18);
}

/* ── Reset ───────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Inter', system-ui, sans-serif;
  font-size: 14px;
  line-height: 1.5;
  color: var(--t1);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
svg { display: block; }

/* ── Background ──────────────────────────────────────────────────────── */
.bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
.bg-dot-grid {
  background-image: radial-gradient(rgba(99,102,241,0.09) 1px, transparent 1px);
  background-size: 28px 28px;
  width: 100%; height: 100%;
}
.bg-glow {
  position: absolute;
  border-radius: 50%;
  filter: blur(80px);
  opacity: 0.35;
}
.bg-glow-1 { width: 700px; height: 700px; background: radial-gradient(circle, #4f46e5 0%, transparent 70%); top: -200px; left: -200px; }
.bg-glow-2 { width: 500px; height: 500px; background: radial-gradient(circle, #7c3aed 0%, transparent 70%); bottom: -100px; right: -100px; }

/* ── App Shell ───────────────────────────────────────────────────────── */
.app { position: relative; z-index: 1; display: flex; height: 100vh; }

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w);
  flex-shrink: 0;
  background: rgba(7,8,15,0.85);
  backdrop-filter: blur(16px);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 12px;
  gap: 4px;
}
.sidebar-logo {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px 20px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 8px;
}
.logo-mark {
  width: 32px; height: 32px;
  background: var(--grad);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 15px; letter-spacing: -0.5px;
  color: white; flex-shrink: 0;
  box-shadow: 0 0 16px rgba(99,102,241,0.45);
}
.logo-text { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
.logo-sub { font-size: 10px; color: var(--t3); margin-top: 1px; letter-spacing: 0.05em; text-transform: uppercase; }

.nav-section-label {
  font-size: 10px; font-weight: 500; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--t3);
  padding: 12px 10px 4px;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px;
  border-radius: 7px;
  font-size: 13.5px; font-weight: 400;
  color: var(--t2);
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid transparent;
}
.nav-item:hover { background: var(--surf-hi); color: var(--t1); }
.nav-item.active {
  background: rgba(99,102,241,0.14);
  color: var(--t1);
  border-color: rgba(99,102,241,0.28);
}
.nav-item.active .nav-icon { color: var(--a3); }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.8; }
.nav-badge {
  margin-left: auto;
  font-size: 10px; font-weight: 600;
  background: var(--grad);
  padding: 1px 6px;
  border-radius: 99px;
  color: white;
}

.sidebar-footer {
  margin-top: auto;
  padding-top: 12px;
  border-top: 1px solid var(--border);
  font-size: 12px; color: var(--t3);
  padding: 12px 10px 0;
}
.sidebar-project {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 10px;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-top: 8px;
  cursor: pointer;
}
.project-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; box-shadow: 0 0 6px var(--green); }
.project-name { font-size: 12px; font-weight: 500; color: var(--t1); }
.project-sub { font-size: 10px; color: var(--t3); }

/* ── Main ────────────────────────────────────────────────────────────── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; overflow: hidden; }

.topbar {
  height: var(--topbar-h);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 24px;
  gap: 12px;
  background: rgba(7,8,15,0.7);
  backdrop-filter: blur(12px);
  flex-shrink: 0;
}
.topbar-breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--t2); }
.breadcrumb-sep { color: var(--t3); }
.breadcrumb-cur { color: var(--t1); font-weight: 500; }
.topbar-spacer { flex: 1; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 14px;
  border-radius: 7px;
  font-size: 13px; font-weight: 500;
  transition: all 0.15s;
  cursor: pointer;
  border: none;
}
.btn-primary {
  background: var(--grad);
  color: white;
  box-shadow: 0 0 16px rgba(99,102,241,0.35);
}
.btn-primary:hover { background: var(--grad-hi); box-shadow: 0 0 24px rgba(99,102,241,0.5); }
.btn-ghost {
  background: var(--surf);
  color: var(--t1);
  border: 1px solid var(--border);
}
.btn-ghost:hover { background: var(--surf-hover); border-color: var(--border-hi); }

.content {
  flex: 1;
  overflow-y: auto;
  padding: 28px 28px;
  scrollbar-width: thin;
  scrollbar-color: var(--t4) transparent;
}
.content::-webkit-scrollbar { width: 4px; }
.content::-webkit-scrollbar-thumb { background: var(--t4); border-radius: 2px; }

/* ── Fade transition ─────────────────────────────────────────────────── */
.page-enter { animation: pageIn 0.2s ease; }
@keyframes pageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

/* ── Section headers ─────────────────────────────────────────────────── */
.page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.4px; }
.page-subtitle { font-size: 14px; color: var(--t2); margin-top: 4px; }
.section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--t3); margin-bottom: 12px; }

/* ── Cards ───────────────────────────────────────────────────────────── */
.card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  position: relative;
  overflow: hidden;
}
.card-title { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--t3); margin-bottom: 8px; }
.card-value { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
.card-sub { font-size: 12px; color: var(--t2); margin-top: 4px; }
.card:has(.card-glow)::before {
  content: ''; position: absolute; inset: 0;
  background: var(--card-glow-color, var(--grad));
  opacity: 0.05;
  pointer-events: none;
}

.card-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
.card-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }
.card-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }

/* ── Badges ──────────────────────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 8px;
  border-radius: 99px;
  font-size: 11px; font-weight: 500;
}
.badge-green  { background: var(--green-dim);  color: var(--green); }
.badge-red    { background: var(--red-dim);    color: var(--red); }
.badge-orange { background: var(--orange-dim); color: var(--orange); }
.badge-yellow { background: var(--yellow-dim); color: var(--yellow); }
.badge-blue   { background: rgba(99,102,241,0.15); color: var(--a3); }
.badge-cyan   { background: var(--cyan-dim);   color: var(--cyan); }
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ── Stat delta ──────────────────────────────────────────────────────── */
.delta-up   { color: var(--green); font-size: 12px; font-weight: 600; }
.delta-down { color: var(--red);   font-size: 12px; font-weight: 600; }

/* ── Dividers ────────────────────────────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.row-gap-4 { display: flex; gap: 14px; align-items: center; }
.row-gap-2 { display: flex; gap: 8px;  align-items: center; }
.flex-1 { flex: 1; }

/* ── ──────────────── PAGE: HOME ──────────────────────────────────────── */
.home-hero {
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 32px;
  align-items: start;
  margin-bottom: 32px;
}
.home-tagline {
  font-size: 38px; font-weight: 700; line-height: 1.15;
  letter-spacing: -1px;
  background: var(--grad);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}
.home-sub {
  font-size: 16px; color: var(--t2); line-height: 1.6;
  max-width: 480px; margin-bottom: 24px;
}
.home-stats { display: flex; gap: 32px; margin-bottom: 28px; }
.home-stat-val { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.home-stat-label { font-size: 12px; color: var(--t3); margin-top: 2px; }

.loop-wrapper {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  display: flex; flex-direction: column; align-items: center;
}
.loop-title { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--t3); margin-bottom: 12px; }

/* Loop SVG animation */
.loop-arrow-path {
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
  animation: drawArrow 1.5s ease forwards;
}
@keyframes drawArrow { to { stroke-dashoffset: 0; } }
.loop-dot {
  animation: dotTravel 3s linear infinite;
  offset-path: path('M200,68 L316,135 L316,265 L200,332 L84,265 L84,135 Z');
}
@keyframes dotTravel { to { offset-distance: 100%; } }

.home-cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-top: 28px; }
.feature-card {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  transition: all 0.2s;
}
.feature-card:hover { border-color: var(--border-hi); box-shadow: var(--shadow-glow); }
.feature-icon {
  width: 36px; height: 36px;
  background: rgba(99,102,241,0.12);
  border: 1px solid rgba(99,102,241,0.25);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 12px;
  font-size: 16px;
}
.feature-name { font-size: 14px; font-weight: 600; margin-bottom: 6px; }
.feature-desc { font-size: 13px; color: var(--t2); line-height: 1.5; }

.project-preview {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  transition: all 0.2s;
  cursor: pointer;
}
.project-preview:hover { border-color: var(--border-hi); }
.pp-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.pp-icon {
  width: 40px; height: 40px; border-radius: 10px;
  background: var(--grad); display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.pp-name { font-size: 15px; font-weight: 600; }
.pp-meta { font-size: 12px; color: var(--t2); margin-top: 3px; }
.pp-kpi { display: flex; gap: 16px; margin-bottom: 14px; }
.pp-kpi-item { font-size: 12px; color: var(--t2); }
.pp-kpi-val { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; color: var(--t1); }
.pp-action {
  background: rgba(99,102,241,0.1);
  border: 1px solid rgba(99,102,241,0.22);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12.5px; color: var(--t2);
}
.pp-action strong { color: var(--t1); }

/* ── PAGE: OVERVIEW ──────────────────────────────────────────────────── */
.overview-header {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 24px;
}
.status-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 12px; border-radius: 99px;
  font-size: 12px; font-weight: 500;
  background: var(--red-dim); color: var(--red);
}
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:0.4; } }

.checkpoint-row {
  display: flex; align-items: center; gap: 24px;
  padding: 14px 20px;
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 20px;
  font-size: 13px;
}
.checkpoint-item { display: flex; flex-direction: column; gap: 3px; }
.ci-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--t3); }
.ci-value { font-size: 13px; font-weight: 500; color: var(--t1); }
.checkpoint-sep { width: 1px; height: 36px; background: var(--border); }

.kpi-card-val { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
.kpi-card-sub { font-size: 12px; color: var(--t2); margin-top: 4px; }
.kpi-card-risk { font-size: 12px; margin-top: 8px; }
.kpi-accent-line {
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--grad);
}

.assets-panel {
  background: var(--surf);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-top: 14px;
}
.asset-row { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); }
.asset-row:last-child { border-bottom: none; }
.asset-label { font-size: 13px; color: var(--t2); }
.asset-val { font-size: 13px; font-weight: 600; color: var(--t1); }

.next-action-banner {
  margin-top: 20px;
  background: rgba(99,102,241,0.08);
  border: 1px solid rgba(99,102,241,0.28);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex; align-items: flex-start; gap: 14px;
}
.na-icon {
  width: 32px; height: 32px; background: rgba(99,102,241,0.18); border-radius: 8px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px;
}
.na-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--a3); font-weight: 600; margin-bottom: 4px; }
.na-text { font-size: 14px; color: var(--t1); line-height: 1.5; }

/* ── PAGE: FAILURE MAP ───────────────────────────────────────────────── */
.fm-kpi-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 14px; margin-bottom: 20px;
}
.fm-kpi {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 18px;
  position: relative; overflow: hidden;
}
.fm-kpi::before {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--kpi-color, var(--grad));
}
.fm-kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--t3); margin-bottom: 6px; }
.fm-kpi-val { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.fm-kpi-detail { font-size: 12px; color: var(--t2); margin-top: 3px; }

.fm-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

.breakdown-tabs { display: flex; gap: 2px; margin-bottom: 12px; }
.btab {
  padding: 5px 12px; border-radius: 6px; font-size: 12px; color: var(--t3);
  cursor: pointer; transition: all 0.15s;
}
.btab.active { background: rgba(99,102,241,0.14); color: var(--a3); font-weight: 500; }
.btab:hover:not(.active) { color: var(--t2); }

.bar-item { margin-bottom: 10px; }
.bar-label-row { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12.5px; }
.bar-label-name { color: var(--t2); }
.bar-label-pct { font-weight: 600; }
.bar-track { height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

.root-cause-list { list-style: none; }
.root-cause-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.root-cause-item:last-child { border-bottom: none; }
.rci-num { width: 20px; height: 20px; border-radius: 50%; background: var(--grad); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
.rci-text { color: var(--t2); line-height: 1.5; }

.cluster-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 20px; }
.cluster-card {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  transition: all 0.2s; cursor: pointer;
}
.cluster-card:hover { border-color: var(--border-hi); }
.cluster-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.cluster-id {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}
.cluster-name { font-size: 13px; font-weight: 500; }
.cluster-pct { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.cluster-count { font-size: 11px; color: var(--t2); margin-top: 2px; }
.cluster-bar { height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; margin-top: 10px; overflow: hidden; }
.cluster-bar-fill { height: 100%; border-radius: 2px; }

.episode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.episode-card {
  background: var(--surf); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  font-size: 12px;
}
.episode-thumb {
  width: 100%; aspect-ratio: 16/9;
  background: linear-gradient(135deg, #0f0f1a, #1a1030);
  border-radius: 6px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: center;
  color: var(--t3); font-size: 11px;
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.episode-thumb::after {
  content: '▶'; position: absolute;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(99,102,241,0.45);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; color: white;
}
.episode-label { font-weight: 500; margin-bottom: 2px; }
.episode-meta { color: var(--t3); font-size: 11px; }

.diagnosis-card {
  background: rgba(244,63,94,0.06);
  border: 1px solid rgba(244,63,94,0.2);
  border-radius: var(--radius);
  padding: 16px 20px;
}
.diag-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--red); font-weight: 600; margin-bottom: 8px; }
.diag-text { font-size: 13.5px; color: var(--t2); line-height: 1.65; }

/* ── PAGE: PATCH PLAN ────────────────────────────────────────────────── */
.gap-list { list-style: none; }
.gap-item {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 7px 0; border-bottom: 1px solid var(--border);
  font-size: 13px; color: var(--t2);
}
.gap-item:last-child { border-bottom: none; }

function renderLoopSVG() {
  const cx = 180, cy = 170, r = 120;
  const nodes = [
    { angle:-90, label:"Eval",        color:"#6366f1" },
    { angle:-30, label:"Gap Analysis",color:"#8b5cf6" },

    { angle:150, label:"Collection",  color:"#6366f1" },
    { angle:210, label:"Checkpoint",  color:"#10b981" },
  ];
  const pts = nodes.map(n => {
    const a = n.angle * Math.PI / 180;
    return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a), ...n };
  });

  const pathStr = pts.map((p, i) => `${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ') + ' Z';

  `).join('');

  return `<svg viewBox="0 0 360 340" width="340" height="320" xmlns="http://www.w3.org/2000/svg">

  <div class="card" style="padding:0">
    <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px">
      <div style="width:8px;height:8px;border-radius:50%;background:${isDone?'var(--green)':isRunning?'var(--a1)':'var(--t3)'};${isRunning?'animation:pulse 1.2s infinite':''}"></div>
      <span style="font-size:12px;font-weight:500;color:var(--t2)">Orchestration Console</span>
      <span style="margin-left:auto;font-size:11px;color:var(--t3)">${isDone?'finished':'waiting for input...'}</span>
    </div>
    <div class="console-wrap" id="console-wrap">
      ${runnerState.logLines.map(l=>`<div class="log-line ${l.cls}"><span class="log-ts">[${l.t}]</span>${l.key?`<span class="log-key">${l.key}</span> `:''}${l.text}</div>`).join('')}
      ${runnerState.logLines.length===0 ? '<div class="log-line">Waiting to start...</div>' : ''}
    </div>
  </div>
</div>`;
}

function startRunner() {
  runnerState.step = 0;
  runnerState.running = true;
  runnerState.logLines = [];
  let i = 0;
  runnerState.timer = setInterval(() => {
    if (i >= LOG_SCRIPT.length) {
      clearInterval(runnerState.timer);
      runnerState.running = false;
      runnerState.step = 4;
      navigate('runner');
      return;
    }
    runnerState.logLines.push(LOG_SCRIPT[i]);
    const pct = i / LOG_SCRIPT.length;
    runnerState.step = pct < 0.3 ? 0 : pct < 0.7 ? 1 : pct < 0.85 ? 2 : 3;
    i++;
    navigate('runner');
    const cw = document.getElementById('console-wrap');
    if (cw) cw.scrollTop = cw.scrollHeight;
  }, 600);
}

function stopRunner() {
  clearInterval(runnerState.timer);
  runnerState.running = false;
  navigate('runner');
}

const PAGE_META = {
  home:     { label:"Project Hub",         breadcrumb:"Project Hub"        },
  overview: { label:"Project Overview",    breadcrumb:"LIBERO Kitchen"     },
  failure:  { label:"Failure Map",         breadcrumb:"Failure Map"        },
  patch:    { label:"Patch Plan",          breadcrumb:"Patch Plan"         },
  runner:   { label:"Iteration Runner",    breadcrumb:"Iteration Runner"   },
  report:   { label:"Improvement Report", breadcrumb:"Improvement Report" },
  memory:   { label:"Platform Memory",    breadcrumb:"Platform Memory"    },
};
const RENDERERS = {
  home: renderHome, overview: renderOverview, failure: renderFailureMap,
  patch: renderPatchPlan, runner: renderRunner, report: renderReport, memory: renderMemory,
};

let currentPage = 'home';

function navigate(pageId) {
  if (!RENDERERS[pageId]) return;
  currentPage = pageId;

  // Update nav
  document.querySelectorAll('.nav-item[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === pageId);
  });

  // Breadcrumb
  const meta = PAGE_META[pageId];
  const bc = document.getElementById('breadcrumb-cur');
  if (bc) bc.textContent = meta.breadcrumb;

  // Render
  const content = document.getElementById('content');
  if (content) content.innerHTML = RENDERERS[pageId]();

  // Re-attach runner buttons
  if (pageId === 'runner') {
    const sc = document.getElementById('console-wrap');
    if (sc) sc.scrollTop = sc.scrollHeight;
  }
}

// Sidebar clicks
document.getElementById('sidebar').addEventListener('click', e => {
  const item = e.target.closest('[data-page]');
  if (item) navigate(item.dataset.page);
});

// Init
navigate('home');
